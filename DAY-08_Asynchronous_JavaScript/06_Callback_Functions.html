<!DOCTYPE html>
<html>
<head>
    <title>Callback Functions</title>
</head>
<body>
    <script>
        function greet(name, callback) {
            console.log("Hello " + name);
            callback();
        }

        function message() {
            console.log("Welcome to JavaScript");
        }

        greet("Harshitha", message);
    </script>
</body>
</html>
