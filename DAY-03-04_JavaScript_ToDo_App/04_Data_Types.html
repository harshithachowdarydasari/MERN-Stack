<!DOCTYPE html>
<html>
<head>
    <title>Data Types</title>
</head>
<body>
    <h1>Primitive Data Types</h1>

    <script>
        let name = "Harshitha";
        let age = 22;
        let isStudent = true;
        let salary = null;
        let city;

        document.write(typeof name + "<br>");
        document.write(typeof age + "<br>");
        document.write(typeof isStudent + "<br>");
        document.write(typeof salary + "<br>");
        document.write(typeof city);
    </script>
</body>
</html>
