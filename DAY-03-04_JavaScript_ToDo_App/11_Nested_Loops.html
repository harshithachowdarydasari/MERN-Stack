<!DOCTYPE html>
<html>
<head>
    <title>Nested Loops</title>
</head>
<body>
    <h1>Nested Loops</h1>

    <script>
        for (let i = 1; i <= 3; i++) {
            for (let j = 1; j <= 3; j++) {
                document.write(i + " " + j + "<br>");
            }
        }
    </script>
</body>
</html>
