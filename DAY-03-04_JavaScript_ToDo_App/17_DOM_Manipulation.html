<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation</title>
</head>
<body>
    <h1 id="heading">Welcome to JavaScript</h1>
    <button onclick="changeText()">Change Text</button>

    <script>
        function changeText() {
            document.getElementById("heading").innerHTML = "DOM Manipulation Successful!";
        }
    </script>
</body>
</html>
