<!DOCTYPE html>
<html>
<head>
    <title>CSS Transition</title>
    <style>
        div {
            width: 150px;
            height: 150px;
            background-color: orange;
            transition: 0.5s;
        }

        div:hover {
            background-color: green;
            width: 250px;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
