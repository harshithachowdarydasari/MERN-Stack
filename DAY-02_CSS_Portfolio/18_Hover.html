<!DOCTYPE html>
<html>
<head>
    <title>CSS Hover</title>
    <style>
        button {
            background-color: blue;
            color: white;
            padding: 10px 20px;
            border: none;
        }

        button:hover {
            background-color: red;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button>Hover Me</button>
</body>
</html>
