<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors</title>
    <style>
        * {
            font-family: Arial;
        }

        h1 {
            color: red;
        }

        .blue {
            color: blue;
        }

        #green {
            color: green;
        }
    </style>
</head>
<body>
    <h1>Element Selector</h1>
    <p class="blue">Class Selector</p>
    <p id="green">ID Selector</p>
</body>
</html>
