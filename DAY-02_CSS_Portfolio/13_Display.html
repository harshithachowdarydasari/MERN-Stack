<!DOCTYPE html>
<html>
<head>
    <title>CSS Display</title>
    <style>
        span {
            display: block;
            background-color: yellow;
        }

        div {
            display: inline;
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <span>Span displayed as Block</span>
    <div>Div displayed as Inline</div>
</body>
</html>
