<!DOCTYPE html>
<html>
<head>
    <title>CSS Transform</title>
    <style>
        div {
            width: 150px;
            height: 150px;
            background-color: purple;
            transition: 0.5s;
        }

        div:hover {
            transform: scale(1.2) rotate(15deg);
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
