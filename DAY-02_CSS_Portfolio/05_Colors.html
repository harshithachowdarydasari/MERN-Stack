<!DOCTYPE html>
<html>
<head>
    <title>CSS Colors</title>
    <style>
        h1 {
            color: red;
        }

        h2 {
            color: #0000ff;
        }

        h3 {
            color: rgb(0, 128, 0);
        }

        body {
            background-color: lightyellow;
        }
    </style>
</head>
<body>
    <h1>Red Color</h1>
    <h2>Blue Color</h2>
    <h3>Green Color</h3>
</body>
</html>
