<!DOCTYPE html>
<html>
<head>
    <title>CSS Margin</title>
    <style>
        div {
            width: 300px;
            border: 2px solid black;
            margin: 50px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div>
        This div has a margin of 50px.
    </div>
</body>
</html>
