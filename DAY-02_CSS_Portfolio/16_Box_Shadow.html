<!DOCTYPE html>
<html>
<head>
    <title>CSS Box Shadow</title>
    <style>
        div {
            width: 300px;
            padding: 20px;
            border: 2px solid black;
            box-shadow: 5px 5px 10px gray;
        }
    </style>
</head>
<body>
    <div>
        This box has a shadow.
    </div>
</body>
</html>
