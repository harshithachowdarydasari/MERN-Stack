<!DOCTYPE html>
<html>
<head>
    <title>CSS Position</title>
    <style>
        .box1 {
            width: 150px;
            height: 100px;
            background-color: lightblue;
            position: relative;
            left: 30px;
        }

        .box2 {
            width: 150px;
            height: 100px;
            background-color: lightcoral;
        }
    </style>
</head>
<body>
    <div class="box1">Relative Position</div>
    <div class="box2">Normal Position</div>
</body>
</html>
