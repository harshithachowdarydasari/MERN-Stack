<!DOCTYPE html>
<html>
<head>
    <title>CSS Borders</title>
    <style>
        div {
            width: 300px;
            border: 3px solid blue;
            border-radius: 15px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div>
        <h2>Border Example</h2>
        <p>This div has a border.</p>
    </div>
</body>
</html>
