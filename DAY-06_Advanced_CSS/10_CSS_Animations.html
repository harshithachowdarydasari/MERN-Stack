<!DOCTYPE html>
<html>
<head>
    <title>CSS Animation</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background: red;
            animation: move 2s infinite;
        }

        @keyframes move {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(300px);
            }
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
