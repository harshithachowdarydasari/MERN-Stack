<!DOCTYPE html>
<html>
<head>
    <title>Modern UI</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .card {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 15px gray;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Modern Card</h2>
        <p>Modern UI Design Example</p>
    </div>
</body>
</html>
