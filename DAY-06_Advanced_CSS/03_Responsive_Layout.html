<!DOCTYPE html>
<html>
<head>
    <title>Responsive Layout</title>
    <style>
        .container {
            display: flex;
            flex-wrap: wrap;
        }

        .box {
            flex: 1 1 250px;
            background: lightblue;
            margin: 10px;
            padding: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
    </div>
</body>
</html>
