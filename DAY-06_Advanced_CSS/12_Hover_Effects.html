<!DOCTYPE html>
<html>
<head>
    <title>Hover Effects</title>
    <style>
        button {
            padding: 10px 20px;
            transition: 0.5s;
        }

        button:hover {
            background: blue;
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <button>Hover Me</button>
</body>
</html>
