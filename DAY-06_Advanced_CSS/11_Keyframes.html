<!DOCTYPE html>
<html>
<head>
    <title>Keyframes</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background: green;
            animation: colorChange 3s infinite;
        }

        @keyframes colorChange {
            0% {
                background: green;
            }

            50% {
                background: orange;
            }

            100% {
                background: blue;
            }
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
