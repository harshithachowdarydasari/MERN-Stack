<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Properties</title>
    <style>
        .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 20px;
            height: 200px;
            border: 2px solid black;
        }

        .box {
            width: 80px;
            height: 80px;
            background: steelblue;
            color: white;
            text-align: center;
            line-height: 80px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>
</body>
</html>
