<!DOCTYPE html>
<html>
<head>
    <title>Callback Hell</title>
</head>
<body>
    <script>
        setTimeout(function () {
            console.log("Step 1");

            setTimeout(function () {
                console.log("Step 2");

                setTimeout(function () {
                    console.log("Step 3");
                }, 1000);

            }, 1000);

        }, 1000);
    </script>
</body>
</html>
